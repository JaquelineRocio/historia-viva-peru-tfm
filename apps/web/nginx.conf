server {
  listen 80;

  # El archivo puede medir hasta 50 MiB. El margen adicional cubre los
  # metadatos del formulario multipart; NestJS mantiene el limite real.
  client_max_body_size 52m;

  # Proxy al backend NestJS (mismo esquema que el proxy de Vite en dev).
  location /api/ {
    proxy_pass http://api:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  # SPA: cualquier ruta cae en index.html (react-router).
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
