# Render hospeda solo la API. PostgreSQL vive en Neon, los archivos en R2 y ML
# se despliega como función ASGI serverless en Modal para disponer de más memoria.
services:
  - type: web
    name: historia-viva-api
    runtime: docker
    dockerContext: apps/api
    dockerfilePath: apps/api/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SCHEMA
        value: tfm_schema
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: WEB_ORIGIN
        sync: false
      - key: SEED_USERNAME
        value: docente
      - key: SEED_PASSWORD
        value: tfm2026
      - key: SEED_DISPLAY_NAME
        value: Docente de demostración
      - key: SEED_ROLE
        value: colaborador
      - key: ADMIN_USERNAME
        value: administrador
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_MAX_PDF_MB
        value: "10"
      - key: DEMO_MAX_SOURCES_PER_USER
        value: "3"
      - key: PROCESSING_QUEUE_DRIVER
        value: database
      - key: FILE_STORAGE_DRIVER
        value: s3
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: ML_INTERNAL_TOKEN
        sync: false
      - key: MODAL_PROXY_TOKEN_ID
        sync: false
      - key: MODAL_PROXY_TOKEN_SECRET
        sync: false
